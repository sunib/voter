apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: frontend-static
  namespace: voter
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`voter.z65.nl`) && PathPrefix(`/`)
      kind: Rule
      services:
        - name: voter-frontend
          port: http
          scheme: http
  tls: {}
