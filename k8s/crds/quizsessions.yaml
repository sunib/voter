apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: quizsessions.examples.configbutler.ai
spec:
  group: examples.configbutler.ai
  scope: Namespaced
  names:
    plural: quizsessions
    singular: quizsession
    kind: QuizSession
    listKind: QuizSessionList
    shortNames:
      - qsession
      - qs
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Title
          type: string
          jsonPath: .spec.title
        - name: Created
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          description: QuizSession defines a quiz that attendees can answer.
          required:
            - spec
          properties:
            spec:
              type: object
              required:
                - title
                - questions
              properties:
                title:
                  type: string
                  minLength: 1
                state:
                  type: string
                  enum:
                    - draft
                    - live
                    - closed
                questions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - id
                  items:
                    type: object
                    required:
                      - id
                      - type
                      - title
                    properties:
                      id:
                        type: string
                        minLength: 1
                        pattern: ^[a-z0-9]([-a-z0-9]*[a-z0-9])?$
                      type:
                        type: string
                        enum:
                          - singleChoice
                          - multiChoice
                          - scale0to10
                          - number
                          - freeText
                      title:
                        type: string
                        minLength: 1
                      required:
                        type: boolean
                      choices:
                        type: array
                        minItems: 1
                        items:
                          type: string
                          minLength: 1
                      min:
                        type: number
                      max:
                        type: number
                      placeholder:
                        type: string
                    x-kubernetes-validations:
                      - rule: "self.type in ['singleChoice','multiChoice'] ? has(self.choices) && size(self.choices) > 0 : !has(self.choices)"
                        message: "choices must be set for choice questions and unset otherwise"
                      - rule: "(has(self.min) || has(self.max)) ? (!has(self.min) || !has(self.max) || self.min <= self.max) : true"
                        message: "min must be <= max"
                      - rule: "self.type == 'scale0to10' ? (has(self.min) && has(self.max) && self.min == 0.0 && self.max == 10.0) : true"
                        message: "scale0to10 requires min=0 and max=10"
            status:
              type: object
              properties:
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  x-kubernetes-list-type: map
                  x-kubernetes-list-map-keys:
                    - type
                  items:
                    type: object
                    required:
                      - type
                      - status
                      - lastTransitionTime
                      - reason
                      - message
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum:
                          - "True"
                          - "False"
                          - "Unknown"
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
